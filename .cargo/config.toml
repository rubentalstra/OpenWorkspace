# getrandom 0.3 requires both the `wasm_js` feature (set on the frontend crate)
# and this cfg to use the browser RNG backend on wasm32-unknown-unknown.
# https://docs.rs/getrandom/latest/getrandom/#webassembly-support
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
