name: Release

# Cut a release by pushing a SemVer tag, e.g. `git tag v0.1.0 && git push --tags`.
# Builds and publishes the container images to GHCR, generates an SBOM and a CBOM,
# and creates a GitHub Release with auto-generated notes and the BOMs attached.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/openworkspace

jobs:
  images:
    name: build & publish images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [web, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          # `latest` is applied only to non-prerelease semver tags.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/containers/Containerfile.${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  boms:
    name: SBOM & CBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g @cyclonedx/cdxgen
      - name: Generate SBOM (CycloneDX)
        run: cdxgen -t rust -o sbom.cdx.json .
      - name: Generate CBOM (cryptography)
        run: cdxgen -t rust --include-crypto -o cbom.cdx.json .
      - uses: actions/upload-artifact@v4
        with:
          name: boms
          path: |
            sbom.cdx.json
            cbom.cdx.json

  release:
    name: github release
    needs: [images, boms]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: boms
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sbom.cdx.json
            cbom.cdx.json
