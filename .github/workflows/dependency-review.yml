name: Dependency review

# Scans pull requests for newly introduced vulnerable dependencies and
# disallowed licenses, complementing cargo-deny/cargo-audit in ci.yml.
on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          # Keep license policy aligned with deny.toml.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Unicode-3.0, Zlib, MPL-2.0
