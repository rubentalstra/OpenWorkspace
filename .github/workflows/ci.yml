name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # sccache caches per-rustc-invocation objects, not incremental fragments, so
  # incremental builds would bypass it. Disable it everywhere to feed the cache.
  CARGO_INCREMENTAL: 0

jobs:
  # No compilation: rustfmt/leptosfmt parse, they don't build. Stays parallel.
  fmt:
    name: rustfmt + leptosfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (pinned by rust-toolchain.toml)
        run: rustup show
      - uses: taiki-e/install-action@v2
        with:
          tool: leptosfmt
      - run: cargo fmt --all --check
      - run: leptosfmt --check apps crates

  # No workspace compilation: deny/audit read Cargo.lock + metadata. Stays parallel.
  supply-chain:
    name: cargo-deny + cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check
      - run: cargo audit

  # clippy + nextest share one workspace compile: both build the default-feature
  # workspace, so running them in a single job compiles the dependency graph once
  # (sccache also dedupes it against the `build` job and previous runs).
  check:
    name: clippy + nextest
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://openworkspace:dev@localhost:5432/openworkspace
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: openworkspace
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: openworkspace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openworkspace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - run: rustup show
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      # Prebuilt sqlx-cli (no source compile). binstall falls back to source only
      # if no prebuilt artifact exists for the runner target.
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall sqlx-cli@0.9.0 --no-confirm
      - name: Apply migrations
        run: cargo sqlx migrate run --source crates/db/migrations
      # Lint against the live schema (query!/query_as! resolve via DATABASE_URL).
      # NOTE: not --all-features — that enables ssr+hydrate together on `app`, which conflict.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Fail the build on a stale offline cache (the committed .sqlx must match
      # the live schema + queries).
      - run: cargo sqlx prepare --workspace --check
      - run: cargo nextest run --workspace
      - run: sccache --show-stats

  build:
    name: leptos build
    runs-on: ubuntu-latest
    # No database in this job: the committed .sqlx offline cache backs the
    # compile-time query!/query_as! checks.
    env:
      SQLX_OFFLINE: "true"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v7
      - run: rustup show
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos
      # Debug build validates the full ssr+wasm compile fast; the release build is
      # exercised by the container image (deploy/containers/Containerfile.web).
      - run: cargo leptos build
      - run: sccache --show-stats
