name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt + leptosfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (pinned by rust-toolchain.toml)
        run: rustup show
      - uses: taiki-e/install-action@v2
        with:
          tool: leptosfmt
      - run: cargo fmt --all --check
      - run: leptosfmt --check apps crates

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      # NOTE: not --all-features — that enables ssr+hydrate together on `app`, which conflict.
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: nextest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: openworkspace
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: openworkspace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openworkspace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://openworkspace:dev@localhost:5432/openworkspace
    steps:
      - uses: actions/checkout@v7
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace

  supply-chain:
    name: cargo-deny + cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check
      - run: cargo audit

  build:
    name: leptos build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos
      # Debug build validates the full ssr+wasm compile fast; the release build is
      # exercised by the container image (deploy/containers/Containerfile.web).
      - run: cargo leptos build
