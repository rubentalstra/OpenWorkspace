name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # sccache caches per-rustc-invocation objects, not incremental fragments, so
  # incremental builds would bypass it. Disable it everywhere to feed the cache.
  CARGO_INCREMENTAL: 0
  # Tailwind standalone binary version. cargo-leptos prefers a `tailwindcss` on
  # PATH (the install step below) and only downloads when absent; pinning the
  # version keeps the installed binary and any fallback download in lockstep and
  # skips cargo-leptos's GitHub "latest" API lookup (which rate-limits on shared
  # CI runner IPs). We must supply the binary ourselves because the musl-static
  # cargo-leptos that taiki-e/install-action ships makes cargo-leptos fetch the
  # *musl* Tailwind build, whose loader is absent on glibc ubuntu — execve then
  # fails with ENOENT in build_tailwind. The glibc binary on PATH avoids that.
  LEPTOS_TAILWIND_VERSION: v4.2.1

jobs:
  # No compilation: rustfmt/leptosfmt parse, they don't build. Stays parallel.
  fmt:
    name: rustfmt + leptosfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (pinned by rust-toolchain.toml)
        run: rustup show
      - uses: taiki-e/install-action@v2
        with:
          tool: leptosfmt
      - run: cargo fmt --all --check
      - run: leptosfmt --check apps crates

  # No workspace compilation: deny/audit read Cargo.lock + metadata. Stays parallel.
  supply-chain:
    name: cargo-deny + cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check
      - run: cargo audit

  # Single compile of the whole workspace, shared with clippy/nextest/build via
  # the `shared-key` rust-cache (warm target dir) and sccache (objects). Covers
  # both the host target (--all-targets) and the wasm/ssr targets (cargo leptos),
  # so the three downstream jobs restore artifacts instead of recompiling deps.
  compile:
    name: compile (warm cache)
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v7
      - run: rustup show
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos
      - name: Install Tailwind CSS (glibc standalone)
        run: |
          curl -fsSL -o /usr/local/bin/tailwindcss \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${LEPTOS_TAILWIND_VERSION}/tailwindcss-linux-x64"
          chmod +x /usr/local/bin/tailwindcss
          tailwindcss --help >/dev/null
      - run: cargo build --workspace --all-targets --locked
      - run: cargo leptos build
      - run: sccache --show-stats

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: compile
    # No database: the committed .sqlx offline cache backs the compile-time
    # query!/query_as! checks.
    env:
      SQLX_OFFLINE: "true"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v7
      - run: rustup show
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      # NOTE: not --all-features — that enables ssr+hydrate together on `app`, which conflict.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: sccache --show-stats

  nextest:
    name: nextest
    runs-on: ubuntu-latest
    needs: compile
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: openworkspace
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: openworkspace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openworkspace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://openworkspace:dev@localhost:5432/openworkspace
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v7
      - run: rustup show
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      # Prebuilt sqlx-cli (no source compile).
      - uses: cargo-bins/cargo-binstall@v1.20.1
      - run: cargo binstall sqlx-cli@0.9.0 --no-confirm
      - name: Apply migrations
        run: cargo sqlx migrate run --source crates/db/migrations
      # Fail the build on a stale offline cache (the committed .sqlx must match
      # the live schema + queries).
      - run: cargo sqlx prepare --workspace --check
      - run: cargo nextest run --workspace
      - run: sccache --show-stats

  build:
    name: leptos build
    runs-on: ubuntu-latest
    needs: compile
    # No database in this job: the committed .sqlx offline cache backs the
    # compile-time query!/query_as! checks.
    env:
      SQLX_OFFLINE: "true"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v7
      - run: rustup show
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos
      - name: Install Tailwind CSS (glibc standalone)
        run: |
          curl -fsSL -o /usr/local/bin/tailwindcss \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${LEPTOS_TAILWIND_VERSION}/tailwindcss-linux-x64"
          chmod +x /usr/local/bin/tailwindcss
          tailwindcss --help >/dev/null
      # Debug build validates the full ssr+wasm compile fast; the release build is
      # exercised by the container image (deploy/containers/Containerfile.web).
      - run: cargo leptos build
      - run: sccache --show-stats
