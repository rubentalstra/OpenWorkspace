# Profile-nested configuration (figment `.nested()`): each top-level table is a
# profile, selected via APP_PROFILE (default "dev"). Production secrets come from
# APP_* environment variables (e.g. APP_DATABASE__URL), never from this file.

[dev.server]
addr = "127.0.0.1:3000"

[dev.database]
# Runtime: the least-privilege role (RLS-governed, DML-only). Made loginnable by
# deploy/dev/postgres-init; grants + RLS come from the p8 migration. Dev-only password.
url = "postgres://openworkspace_app:devapp@localhost:5432/openworkspace"
# Owner/migrator: runs migrations and privileged startup setup (bypasses RLS).
migrator_url = "postgres://openworkspace:dev@localhost:5432/openworkspace"
max_connections = 5

[dev.observability]
service_name = "openworkspace-dev"
log_filter = "info,openworkspace=debug,sqlx=warn"
metrics_enabled = true

[dev.storage]
# Dev SeaweedFS S3 gateway (deploy/dev/compose.yaml). Dev-only credentials match
# deploy/dev/seaweedfs/s3.json; production supplies these via APP_STORAGE__* env.
kind = "s3"
s3_endpoint = "http://localhost:8333"
s3_region = "us-east-1"
s3_bucket = "openworkspace"
s3_access_key = "openworkspacedev"
s3_secret_key = "openworkspacedevsecret"
s3_allow_http = true
s3_force_path_style = true
presign_ttl = "15m"
max_upload_bytes = 10485760
thumbnail_max_px = 512

[dev.auth]
# Dev-only root key-encryption key (base64 of 32 bytes). Production supplies this
# via APP_AUTH__FIELD_ENCRYPTION_KEY; never reuse this value outside local dev.
field_encryption_key = "TVQh4Ye4yQtl6ma/awrxgWSmo3JS5dUwkuVtBtda+70="
webauthn_rp_id = "localhost"
webauthn_rp_origin = "http://localhost:3000"
webauthn_rp_name = "OpenWorkspace"
# Seed the local Keycloak SSO provider (deploy/dev/compose.yaml realm) at startup,
# so `/login` shows a "Continue with Keycloak" button and the flow works. Dev-only.
dev_seed_keycloak = true
# First-boot instance admin for password login (and the e2e). Dev-only credentials;
# production sets these via APP_AUTH__BOOTSTRAP_ADMIN_*. The account is flagged
# must-change. Sign in at /login with these, or via Keycloak SSO (alice / alicepw).
bootstrap_admin_email = "admin@openworkspace.test"
# ≥12 chars to satisfy the password policy (so it can also be re-set via the
# change-password flow in dev/e2e).
bootstrap_admin_password = "devadminpassword"

[prod.observability]
service_name = "openworkspace"
log_filter = "info"
