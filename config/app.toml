# Profile-nested configuration (figment `.nested()`): each top-level table is a
# profile, selected via APP_PROFILE (default "dev"). Production secrets come from
# APP_* environment variables (e.g. APP_DATABASE__URL), never from this file.

[dev.server]
addr = "127.0.0.1:3000"

[dev.database]
# Runtime: the least-privilege role (RLS-governed, DML-only). Made loginnable by
# deploy/dev/postgres-init; grants + RLS come from the p8 migration. Dev-only password.
url = "postgres://openworkspace_app:devapp@localhost:5432/openworkspace"
# Owner/migrator: runs migrations and privileged startup setup (bypasses RLS).
migrator_url = "postgres://openworkspace:dev@localhost:5432/openworkspace"
max_connections = 5

[dev.observability]
service_name = "openworkspace-dev"
log_filter = "info,openworkspace=debug,sqlx=warn"
metrics_enabled = true

[dev.auth]
# Dev-only root key-encryption key (base64 of 32 bytes). Production supplies this
# via APP_AUTH__FIELD_ENCRYPTION_KEY; never reuse this value outside local dev.
field_encryption_key = "TVQh4Ye4yQtl6ma/awrxgWSmo3JS5dUwkuVtBtda+70="
webauthn_rp_id = "localhost"
webauthn_rp_origin = "http://localhost:3000"
webauthn_rp_name = "OpenWorkspace"

[prod.observability]
service_name = "openworkspace"
log_filter = "info"
