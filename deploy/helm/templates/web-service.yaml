apiVersion: v1
kind: Service
metadata:
  name: {{ include "openworkspace.fullname" . }}-web
  labels:
    app.kubernetes.io/name: openworkspace
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  selector:
    app.kubernetes.io/name: openworkspace
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
