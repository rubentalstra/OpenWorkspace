apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openworkspace.fullname" . }}-worker
  labels:
    app.kubernetes.io/name: openworkspace
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  strategy:
    type: Recreate # singleton: never run two schedulers across a rollout
  selector:
    matchLabels:
      app.kubernetes.io/name: openworkspace
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openworkspace
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image }}:{{ .Values.worker.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources: {{- toYaml .Values.worker.resources | nindent 12 }}
