apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openworkspace.fullname" . }}-web
  labels:
    app.kubernetes.io/name: openworkspace
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: openworkspace
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openworkspace
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image }}:{{ .Values.web.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
